# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
ci:
  skip:
    - uv-lock
    - cargo-fmt
    - cargo-deny
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/tombi-toml/tombi-pre-commit
    rev: 3a28f1f8a58c75b8ceedd4579faec7c677644613  # frozen: v0.11.5
    hooks:
      - id: tombi-format
        exclude: (Cargo|uv)\.lock
        args: ["--offline"]
  - repo: https://github.com/crate-ci/typos
    rev: f8a58b6b53f2279f71eb605f03a4ae4d10608f45  # frozen: v1.47.0
    hooks:
      - id: typos
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: fa60a193803535a9e2accdb3ca4b1b584b1150cb  # frozen: 0.11.15
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 5e2fb545eba1ea9dc051f6f962d52fe8f76a9794  # frozen: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  # Copied from maturin repo
  - repo: local
    hooks:
      - id: cargo-fmt # rustup component add rustfmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-deny # cargo install --locked cargo-deny
        name: cargo deny
        entry: cargo deny --all-features check --
        language: system
        pass_filenames: false
