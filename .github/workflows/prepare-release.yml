name: Prepare Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  KNOPE_VERSION: 0.22.4

jobs:
  prepare-release:
    if: "!contains(github.event.head_commit.message, 'chore: prepare release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    environment: release
    concurrency:
      group: prepare-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Knope
        uses: knope-dev/action@v2.1.2
        with:
          version: ${{ env.KNOPE_VERSION }}
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Check whether a release is needed
        id: plan
        run: |
          knope --dry-run plan-release > "$RUNNER_TEMP/knope-plan.txt"
          if [ -s "$RUNNER_TEMP/knope-plan.txt" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Prepare release branch and PR
        if: ${{ steps.plan.outputs.has_changes == 'true' }}
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: knope prepare-release
